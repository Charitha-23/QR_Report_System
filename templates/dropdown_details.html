{% extends "layouts/base.html" %}

{% block content %}

<div class="py-4">
    <h3>{{ field }} : {{ value }}</h3>
</div>

<div class="card shadow">
    <div class="card-body">

        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Division</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for r in reports %}
                <tr>
                    <td>{{ r.document_id }}</td>
                    <td>{{ r.report_name }}</td>
                    <td>{{ r.division }}</td>
                    <td>{{ r.report_date }}</td>

                    <td>
                        <a href="/report/{{ r.document_id }}" 
                           class="btn btn-sm btn-primary">
                           View
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>
</div>

{% endblock %}
