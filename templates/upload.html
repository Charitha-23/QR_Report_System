{% extends "layouts/base.html" %}

{% block title %} Upload {% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <h3 class="mb-4">Upload Report</h3>

            <form id="uploadForm" method="POST" enctype="multipart/form-data">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Report Name *</label>
                        <input type="text" name="report_name" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Report Type *</label>
                        <select name="report_type" id="reportTypes" class="form-select" required>
                            <option value="">Select Report Type</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Division *</label>
                        <select name="division" id="divisions" class="form-select" required>
                            <option value="">Select Division</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Document ID *</label>
                        <input type="text" name="document_id" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Machine / Equipment</label>
                        <select name="equipment" id="equipmentList" class="form-select">
                            <option value="">Select Equipment</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Prepared By *</label>
                        <input type="text" name="prepared_by" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Report Date *</label>
                        <input type="date" name="report_date" class="form-control" required>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label">Summary</label>
                        <textarea name="summary" class="form-control"></textarea>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label">Upload Files *</label>
                        <input type="file" id="files" class="form-control" multiple>
                        <small id="fileCountText" class="text-muted">No files selected</small>
                    </div>

                    <ul id="fileList" class="list-group mt-2"></ul>

                </div>

                <button id="uploadBtn" class="btn btn-primary px-4 mt-3">Upload</button>

            </form>

        </div>
    </div>

</div>

<!-- TOAST CONTAINER -->
<div id="toastBox" style="
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
"></div>

<script>

// -------------------- DROPDOWNS --------------------
fetch('/api/dropdowns')
.then(res => res.json())
.then(data => {

    let typeEl = document.getElementById('reportTypes');
    let divisionEl = document.getElementById('divisions');
    let equipEl = document.getElementById('equipmentList');

    (data.report_type || []).forEach(v => {
        typeEl.innerHTML += `<option value="${v.name}">${v.name}</option>`;
    });

    (data.division || []).forEach(v => {
        divisionEl.innerHTML += `<option value="${v.name}">${v.name}</option>`;
    });

    (data.equipment || []).forEach(v => {
        equipEl.innerHTML += `<option value="${v.name}">${v.name}</option>`;
    });

});


// -------------------- FILE HANDLING --------------------
let selectedFiles = [];

document.getElementById("files").addEventListener("change", function(e) {
    let newFiles = Array.from(e.target.files);
    selectedFiles = selectedFiles.concat(newFiles);
    updateFileList();
    e.target.value = "";
});

function updateFileList() {
    let list = document.getElementById("fileList");
    let fileCountText = document.getElementById("fileCountText");

    list.innerHTML = "";

    selectedFiles.forEach((file, index) => {
        let li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between align-items-center";

        li.innerHTML = `
            ${file.name}
            <button type="button" class="btn btn-sm btn-danger" onclick="removeFile(${index})">
                Remove
            </button>
        `;

        list.appendChild(li);
    });

    if (selectedFiles.length === 0) {
        fileCountText.innerText = "No files selected";
    } else {
        fileCountText.innerText = selectedFiles.length + " file(s) selected";
    }
}

function removeFile(index) {
    selectedFiles.splice(index, 1);
    updateFileList();
}


// -------------------- TOAST --------------------
function showToast(message, type="success") {

    let toast = document.createElement("div");

    toast.style.background = type === "success" ? "#28a745" : "#dc3545";
    toast.style.color = "white";
    toast.style.padding = "10px 15px";
    toast.style.marginTop = "10px";
    toast.style.borderRadius = "6px";
    toast.style.boxShadow = "0 4px 10px rgba(0,0,0,0.1)";
    toast.style.fontSize = "14px";

    toast.innerText = message;

    document.getElementById("toastBox").appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 3000);
}


// -------------------- SUBMIT --------------------
let isUploading = false;

document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    if (isUploading) return;

    if (selectedFiles.length === 0) {
        showToast("Please select at least one file", "error");
        return;
    }

    isUploading = true;

    let submitBtn = document.getElementById("uploadBtn");
    submitBtn.disabled = true;
    submitBtn.innerText = "Uploading...";

    let formData = new FormData(this);

    selectedFiles.forEach(file => {
        formData.append("files", file);
    });

    try {

        let res = await fetch("/api/upload-report", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        if (res.ok) {
            showToast("Uploaded successfully", "success");

            setTimeout(() => {
                location.reload();
            }, 1500);

        } else {
            showToast(data.error || "Upload failed", "error");
            submitBtn.disabled = false;
            submitBtn.innerText = "Upload";
            isUploading = false;
        }

    } catch (err) {
        showToast("Network error", "error");
        submitBtn.disabled = false;
        submitBtn.innerText = "Upload";
        isUploading = false;
    }

});

</script>

{% endblock %}
