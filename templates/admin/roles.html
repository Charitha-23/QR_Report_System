{% extends "layouts/base.html" %}

{% block content %}

<style>
/* Dark blue checkbox */
.form-check-input:checked {
    background-color: #1f3bb3;
    border-color: #1f3bb3;
}

.form-check-input:focus {
    box-shadow: 0 0 0 0.2rem rgba(31, 59, 179, 0.25);
}

/* Hover effect */
#divisions .form-check:hover,
#types .form-check:hover {
    background: #f5f7ff;
    border-radius: 6px;
    
}
</style>

<div class="container-fluid py-4">

    <div class="row">

        <!-- USER + ROLE -->
        <div class="col-lg-6">
            <div class="card border-0 shadow mb-4">
                <div class="card-header bg-light d-flex justify-content-between">
                    <h6 class="mb-0">
                        <i class="fas fa-user-cog me-2"></i>User & Role
                    </h6>
                    <span id="roleBadge" class="badge bg-primary">Role</span>
                </div>
                <div class="card-body">

                    <div class="mb-3">
                        <label>Select User</label>
                        <select id="userSelect" class="form-select"></select>
                    </div>

                    <div>
                        <label>Assign Role</label>
                        <select id="roleSelect" class="form-select"></select>
                    </div>

                </div>
            </div>
        </div>

        <!-- PERMISSIONS -->
        <div class="col-lg-6">
            <div class="card border-0 shadow mb-4">
                <div class="card-header bg-light">
                    <h6><i class="fas fa-shield-alt me-2"></i>Permissions</h6>
                </div>
                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span>View Documents</span>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="view" disabled>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span>Edit Documents</span>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="edit" disabled>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span>Delete Documents</span>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="delete" disabled>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <span>Download Documents</span>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="download" disabled>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- DATA SCOPE -->
    <div class="card border-0 shadow">
        <div class="card-header bg-light">
            <h6><i class="fas fa-filter me-2"></i>Data Scope</h6>
        </div>
        <div class="card-body">

            <div class="row">

                <!-- DIVISIONS -->
                <div class="col-md-6">
                    <label>Allowed Divisions</label>

                    <input type="text" class="form-control mb-2"
                           placeholder="Search..."
                           onkeyup="filterOptions(this, 'divisions')">

                    <div class="mb-2">
                        <button class="btn btn-sm btn-outline-primary" onclick="selectAll('divisions')">Select All</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="clearAll('divisions')">Clear</button>
                        <small id="divCount" class="ms-2 text-muted"></small>
                    </div>

                    <div id="divisions" class="border rounded p-2" style="max-height:200px; overflow:auto;"></div>
                </div>

                <!-- TYPES -->
                <div class="col-md-6">
                    <label>Allowed Report Types</label>

                    <input type="text" class="form-control mb-2"
                           placeholder="Search..."
                           onkeyup="filterOptions(this, 'types')">

                    <div class="mb-2">
                        <button class="btn btn-sm btn-outline-primary" onclick="selectAll('types')">Select All</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="clearAll('types')">Clear</button>
                        <small id="typeCount" class="ms-2 text-muted"></small>
                    </div>

                    <div id="types" class="border rounded p-2" style="max-height:200px; overflow:auto;"></div>
                </div>

            </div>

            <div class="mt-4 text-end">
                <button class="btn btn-primary" onclick="saveUserAccess()">
                    <i class="fas fa-save me-2"></i>Save Access
                </button>
            </div>

        </div>
    </div>

</div>

<script src="/static/js/roles.js"></script>

{% endblock %}
